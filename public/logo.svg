<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60" role="img">
  <title>NestBridge</title>
  <desc>NestBridge logo — navy and sky blue</desc>

  <!-- arch -->
  <path d="M 22 42 Q 42 14 62 42" fill="none" stroke="#4A90D9" stroke-width="4.5" stroke-linecap="round"/>
  <!-- deck -->
  <rect x="17" y="40" width="50" height="4" rx="2" fill="#1B3A6B"/>
  <!-- pillars -->
  <rect x="17" y="44" width="5" height="12" rx="1.5" fill="#1B3A6B"/>
  <rect x="62" y="44" width="5" height="12" rx="1.5" fill="#1B3A6B"/>
  <!-- roof -->
  <polygon points="37,24 42,13 47,24" fill="#4A90D9"/>
  <!-- house body -->
  <rect x="35" y="28" width="14" height="14" rx="1.5" fill="#1B3A6B" opacity="0.12"/>
  <rect x="35" y="28" width="14" height="14" rx="1.5" fill="none" stroke="#4A90D9" stroke-width="1.2"/>
  <!-- door -->
  <rect x="38" y="33" width="8" height="9" rx="1" fill="#1B3A6B"/>
  <!-- location pin -->
  <circle cx="42" cy="7" r="4" fill="#4A90D9"/>
  <circle cx="42" cy="7" r="1.8" fill="white"/>

  <!-- wordmark -->
  <text x="82" y="44"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="600"
    font-size="28"
    fill="#1B3A6B">Nest</text>
  <text x="148" y="44"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="400"
    font-size="28"
    fill="#4A90D9">Bridge</text>
</svg>
